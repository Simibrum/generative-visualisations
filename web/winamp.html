<title>Milkdrop Visualiser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  canvas { display: block; }
  #start-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    z-index: 10;
    cursor: pointer;
  }
  #start-screen span {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    font-size: clamp(18px, 4vw, 32px);
    letter-spacing: 0.1em;
    opacity: 0.8;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.min.js"></script>
<script src="spectral-debug.js"></script>
</head>
<body>
<div id="start-screen"><span>tap to begin</span></div>

<script>
// ============================================================
// Milkdrop Visualiser — Audio-Reactive Winamp-Style
//
// Uses p5 API exclusively (not raw drawingContext).
// Same pattern as creatures.html: BLEND→fade→ADD→draw→BLEND
// All colors in RGB mode to match creatures.html exactly.
// ============================================================

var SMOOTH = 0.12;
var mic, fft;
var started = false;
var audioReady = false;
var spectralDebug = window.createSpectralDebug ? window.createSpectralDebug() : null;
var smBass = 0, smMids = 0, smTreble = 0, smAmplitude = 0;
var W, H, HW, HH, minDim;
var globalTime = 0;
var hueOffset = 0;
var SYMMETRY = 8;
var lissA = 3, lissB = 2, lissC = 1;
var lissATarget = 3, lissBTarget = 5, lissCTarget = 1.5;
var paramTimer = 0;
var waveformData = [];
var spectrumData = [];
var particles = [];
var MAX_PARTICLES = 60;

// Pre-computed color lookup
function hc(h, s, b) {
  h = ((h % 360) + 360) % 360;
  var c = b * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
  var r, g, bl;
  if (h < 60)       { r=c; g=x; bl=0; }
  else if (h < 120) { r=x; g=c; bl=0; }
  else if (h < 180) { r=0; g=c; bl=x; }
  else if (h < 240) { r=0; g=x; bl=c; }
  else if (h < 300) { r=x; g=0; bl=c; }
  else              { r=c; g=0; bl=x; }
  return [(r+m)*255, (g+m)*255, (bl+m)*255];
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  W = width; H = height; HW = W/2; HH = H/2;
  minDim = min(W, H);
  background(0);
  noLoop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  W = width; H = height; HW = W/2; HH = H/2;
  minDim = min(W, H);
}

function startAudio() {
  if (audioReady) return;
  audioReady = true;
  userStartAudio().then(function() {
    mic = new p5.AudioIn();
    mic.start(function() {
      fft = new p5.FFT(0.8, 256);
      fft.setInput(mic);
    });
  });
}

function handleStart() {
  document.getElementById('start-screen').style.display = 'none';
  if (!started) { started = true; startAudio(); loop(); }
}

document.getElementById('start-screen').addEventListener('click', handleStart);
document.getElementById('start-screen').addEventListener('touchend', function(e) {
  e.preventDefault(); handleStart();
});

// ============================================================
function draw() {
  if (!started) return;
  var dt = 1/30;
  globalTime += dt;

  // Audio
  var bassRaw=0, midsRaw=0, trebleRaw=0, ampRaw=0;
  if (fft) {
    var sp = fft.analyze();
    spectrumData = sp;
    waveformData = fft.waveform();
    var ny = sampleRate()/2, bc = sp.length, bw = ny/bc;
    var bS=0,bN=0,mS=0,mN=0,tS=0,tN=0;
    for (var i=0; i<bc; i++) {
      var f=i*bw, v=sp[i]/255;
      if (f>=20 && f<250)         { bS+=v; bN++; }
      else if (f>=250 && f<2000)  { mS+=v; mN++; }
      else if (f>=2000 && f<8000){ tS+=v; tN++; }
    }
    bassRaw = bN>0?bS/bN:0;
    midsRaw = mN>0?mS/mN:0;
    trebleRaw = tN>0?tS/tN:0;
    ampRaw = fft.getEnergy('bass','treble')/255;
  }

  if (isFinite(bassRaw)) smBass += (bassRaw - smBass) * SMOOTH;
  if (isFinite(midsRaw)) smMids += (midsRaw - smMids) * SMOOTH;
  if (isFinite(trebleRaw)) smTreble += (trebleRaw - smTreble) * SMOOTH;
  if (isFinite(ampRaw)) smAmplitude += (ampRaw - smAmplitude) * SMOOTH;
  // Safety reset if NaN crept in
  if (!isFinite(smBass)) smBass = 0;
  if (!isFinite(smMids)) smMids = 0;
  if (!isFinite(smTreble)) smTreble = 0;
  if (!isFinite(smAmplitude)) smAmplitude = 0;
  if (!isFinite(hueOffset)) hueOffset = 0;

  if (spectralDebug) {
    spectralDebug.update([
      { label: 'Bass', range: '20–250 Hz', value: smBass, color: '#ff00ff' },
      { label: 'Mids', range: '250 Hz–2 kHz', value: smMids, color: '#00ffff' },
      { label: 'Treble', range: '2–8 kHz', value: smTreble, color: '#39ff14' },
      { label: 'Overall', value: smAmplitude, color: '#ffffff' }
    ]);
  }

  hueOffset = (hueOffset + (15 + smTreble*120)*dt) % 360;

  // === FADE === (same pattern as creatures.html)
  blendMode(BLEND);
  noStroke();
  fill(0, 0, 0, 28);
  rect(0, 0, W, H);

  // === DRAW === (ADD mode)
  blendMode(ADD);

  push();
  translate(HW, HH);

  pDrawTunnel();
  pDrawSpectrum();
  pDrawKaleidoscope();
  pDrawWaveform();
  pDrawGlow();

  pop();

  pDrawParticles();

  blendMode(BLEND);
  pEvolveLissajous();
}

// ============================================================
// All drawing uses p5 API. Colors use fill(r,g,b,a) / stroke(r,g,b,a).
// Alpha is 0-255 scale in default p5 RGB mode.
// Key: keep per-pixel ADD contribution < fade amount (~30/255 = 0.12)
// ============================================================

function pDrawTunnel() {
  var nR = 7, mR = minDim * 0.45, pulse = 1 + smBass * 0.6;
  noFill();
  for (var r = 0; r < nR; r++) {
    var t = (r+1)/(nR+1), rad = mR * t * pulse;
    var spd = globalTime * (0.2 + r * 0.08);
    var h = (hueOffset + r * 45 + 180) % 360;
    var rgb = hc(h, 0.5, 0.3 + smAmplitude * 0.3);
    var a = (1-t) * 25 + smAmplitude * 20 + 10;
    stroke(rgb[0], rgb[1], rgb[2], a);
    strokeWeight(1.2);
    beginShape();
    for (var i = 0; i <= 90; i++) {
      var ang = TWO_PI/90*i;
      var w = sin(ang*3+spd) * (5 + smBass * minDim * 0.02);
      var br = sin(globalTime*0.35+r*1.1) * minDim * 0.012;
      var rr = rad + w + br;
      vertex(cos(ang+spd*0.1)*rr, sin(ang+spd*0.1)*rr);
    }
    endShape(CLOSE);
  }
}

function pDrawSpectrum() {
  if (!spectrumData || spectrumData.length === 0) return;
  var n = 64, step = max(1, floor(spectrumData.length/n));
  var iR = minDim * 0.12, mH = minDim * 0.20;
  for (var i = 0; i < n; i++) {
    var ang = TWO_PI/n*i - HALF_PI;
    var v = spectrumData[min(i*step, spectrumData.length-1)] / 255;
    var bH = max(2, v * mH * (0.5 + smAmplitude * 0.7));
    var h = (hueOffset + i * 360/n) % 360;
    var rgb = hc(h, 0.7, 0.3+v*0.4);
    stroke(rgb[0], rgb[1], rgb[2], 15 + v * 40);
    strokeWeight(max(1.5, TWO_PI*iR/n*0.5));
    var ca = cos(ang), sa = sin(ang);
    line(ca*iR, sa*iR, ca*(iR+bH), sa*(iR+bH));
  }
}

function pDrawKaleidoscope() {
  var bR = minDim * 0.18, sc = 1 + smBass * 1.2;
  var ms = 0.4 + smMids * 2, t = globalTime * ms;
  var la = lissA, lb = lissB, lc = lissC;
  var kRot = sin(globalTime*0.08)*0.3 + smMids * sin(globalTime*0.5) * 0.2;
  var nP = 90;
  noFill();

  for (var s = 0; s < SYMMETRY; s++) {
    var sAng = TWO_PI/SYMMETRY*s + kRot;
    push();
    rotate(sAng);

    var h1 = (hueOffset + s * 360/SYMMETRY) % 360;
    var rgb1 = hc(h1, 0.7, 0.8);

    // Glow
    stroke(rgb1[0], rgb1[1], rgb1[2], 10 + smAmplitude * 12);
    strokeWeight(4);
    beginShape();
    for (var i = 0; i <= nP; i++) {
      var p = i/nP*TWO_PI;
      var x = sin(la*p+t) * bR * sc;
      var y = sin(lb*p+lc*t*0.7+smMids*0.4*sin(p*3)) * bR * sc * 0.5;
      x += sin(p*5+globalTime*0.8) * (3 + smMids * 10);
      vertex(x, y);
    }
    endShape();

    // Core
    var rgb2 = hc(h1, 0.8, 1.0);
    stroke(rgb2[0], rgb2[1], rgb2[2], 15 + smAmplitude * 12);
    strokeWeight(1.5);
    beginShape();
    for (var i = 0; i <= nP; i++) {
      var p = i/nP*TWO_PI;
      var x = sin(la*p+t) * bR * sc;
      var y = sin(lb*p+lc*t*0.7+smMids*0.4*sin(p*3)) * bR * sc * 0.5;
      x += sin(p*5+globalTime*0.8) * (3 + smMids * 10);
      vertex(x, y);
    }
    endShape();

    // Secondary
    var h2 = (hueOffset + s * 360/SYMMETRY + 60) % 360;
    var rgb3 = hc(h2, 0.7, 0.6);
    stroke(rgb3[0], rgb3[1], rgb3[2], 10 + smAmplitude * 10);
    strokeWeight(1);
    beginShape();
    for (var i = 0; i <= nP; i++) {
      var p = i/nP*TWO_PI;
      var x = sin(la*p+t+0.5) * bR * sc * 0.7;
      var y = cos(lb*p+lc*t*0.5) * bR * sc * 0.35;
      vertex(x, y);
    }
    endShape();

    pop();
  }
}

function pDrawWaveform() {
  if (!waveformData || waveformData.length === 0) return;
  var wR = minDim * 0.24, dist = 25 + smMids * 80;
  var step = max(1, floor(waveformData.length/200));
  var h = (hueOffset + 120) % 360;
  noFill();

  // Glow
  var rgb1 = hc(h, 0.4, 0.4);
  stroke(rgb1[0], rgb1[1], rgb1[2], 15);
  strokeWeight(3);
  beginShape();
  for (var i = 0; i < waveformData.length; i += step) {
    var a = map(i, 0, waveformData.length, 0, TWO_PI);
    var r = wR + waveformData[i]*dist + sin(a*3+globalTime*1.5)*smBass*15;
    vertex(cos(a)*r, sin(a)*r);
  }
  endShape(CLOSE);

  // Sharp
  var rgb2 = hc(h, 0.3, 0.9);
  stroke(rgb2[0], rgb2[1], rgb2[2], 35 + smAmplitude * 25);
  strokeWeight(1.2);
  beginShape();
  for (var i = 0; i < waveformData.length; i += step) {
    var a = map(i, 0, waveformData.length, 0, TWO_PI);
    var r = wR + waveformData[i]*dist + sin(a*3+globalTime*1.5)*smBass*15;
    vertex(cos(a)*r, sin(a)*r);
  }
  endShape(CLOSE);
}

function pDrawGlow() {
  var sz = minDim * 0.03 * (1 + smBass * 2);
  var h = (hueOffset + 60) % 360;
  var rgb = hc(h, 0.4, 0.15);
  noStroke();

  fill(rgb[0], rgb[1], rgb[2], 4 + smAmplitude * 5);
  ellipse(0, 0, sz * 6, sz * 6);

  fill(255, 255, 255, 3 + smAmplitude * 5);
  ellipse(0, 0, sz * 1.5, sz * 1.5);
}

function pDrawParticles() {
  var sr = max(0, floor(smTreble * 6));
  if (smTreble < 0.05 && frameCount % 8 === 0) sr = 1;
  for (var i = 0; i < sr && particles.length < MAX_PARTICLES; i++) {
    var ang = random(TWO_PI), d = random(minDim*0.08, minDim*0.38);
    particles.push({
      x: HW+cos(ang)*d, y: HH+sin(ang)*d,
      vx: random(-0.7,0.7), vy: random(-0.7,0.7),
      life: 1, decay: random(0.008,0.025),
      size: random(1.5,3.5), hue: (hueOffset+random(90))%360
    });
  }
  noStroke();
  for (var i = particles.length-1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i,1); continue; }
    var sz = p.size * (1 + smTreble * 2.5);
    var rgb = hc(p.hue, 0.5, 0.5);
    fill(rgb[0], rgb[1], rgb[2], 30 * p.life);
    ellipse(p.x, p.y, sz, sz);
    fill(rgb[0], rgb[1], rgb[2], 8 * p.life);
    ellipse(p.x, p.y, sz*4, sz*4);
  }
}

function pEvolveLissajous() {
  paramTimer += 1/30;
  if (paramTimer > 5 + random(4)) {
    paramTimer = 0;
    lissATarget = floor(random(1,8));
    lissBTarget = floor(random(1,8));
    lissCTarget = random(0.3, 3);
  }
  var r = 0.012 + smMids * 0.04;
  lissA += (lissATarget-lissA)*r;
  lissB += (lissBTarget-lissB)*r;
  lissC += (lissCTarget-lissC)*r;
}
</script>
</body>
</html>
